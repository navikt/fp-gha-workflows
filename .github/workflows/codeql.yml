name: "Statisk Kode Analyse"
on:
  workflow_call:
    secrets:
      READER_TOKEN:
        description: "A token passed from the caller workflow"
        required: true
    inputs:
      java-version:
        required: false
        type: string
        description: Java SDK versjon som skal brukes.
        default: "25"
      language:
        required: false
        type: string
        description: Språk som skal scannes
        default: "java"
      use-reader:
        required: false
        type: boolean
        description: Hvilket token skal brukes?
        default: false
      sonar:
        required: false
        type: boolean
        description: Kjøre sonar scan?
        default: true
      runs-on:
        required: false
        type: string
        description: Miljø versjon som skal brukes til bygg.
        default: "ubuntu-latest"
      t-2c:
        required: false
        type: string
        description: Tråd konfig til maven.
        default: ""

jobs:
  statisk-kode-analyse:
    name: Statisk analyse av kodebasen
    if: github.actor != 'dependabot[bot]'
    runs-on: ${{ (github.event.pull_request.user.login == 'dependabot[bot]' && 'ubuntu-latest') || inputs.runs-on }}
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0 # checkout gir shallow copy - fetch-depth: 0 vil tilgjengeliggjøre tags
      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # ratchet:github/codeql-action/init@v3
        with:
          languages: ${{ inputs.language }}
          config-file: navikt/fp-gha-workflows/.github/codeql/codeql-config.yml@main
      - name: Set up JDK-${{ inputs.java-version }} with cache
        if: inputs.language == 'java'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'
      - name: Maven install and test
        if: inputs.language == 'java'
        uses: navikt/fp-gha-workflows/.github/actions/build-maven-application@main # ratchet:exclude
        with:
          t-2c: ${{ inputs.t-2c }}
          profil: -Psonar
        env:
          GITHUB_TOKEN: ${{ (github.actor != 'dependabot[bot]' && inputs.use-reader && secrets.READER_TOKEN) || secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
      - name: Autobuild
        if: inputs.language != 'java'
        uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # ratchet:github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # ratchet:github/codeql-action/analyze@v3
        with:
          category: "/language:${{ inputs.language }}"
      - name: Perform Sonar Analysis
        if: inputs.language == 'java' && inputs.sonar
        run: |
          mvn jacoco:report jacoco:report-aggregate sonar:sonar ${{ inputs.t-2c }} -e -q -B -Djacoco.destFile=$(pwd)/target/jacoco.exec -Psonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
