name: Build app
on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        description: Java SDK versjon som skal brukes.
        default: '25'
      working-directory:
        required: false
        default: .
        type: string

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    outputs:
      build-version: ${{ steps.build-and-test.outputs.build-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v4
        with:
          fetch-depth: 0 # checkout gir shallow copy - fetch-depth: 0 vil tilgjengeliggjøre tags
      - name: Set up JDK-${{ inputs.java-version }} with cache
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'
      - name: Maven verify
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: mvn verify -ntp -e -B
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
      - name: Clean up generated stuff before caching
        run: |
          if [[ -d "~/.m2/repository/no/nav/foreldrepenger" ]]; then
            rm ~/.m2/repository/no/nav/foreldrepenger -r
          fi
