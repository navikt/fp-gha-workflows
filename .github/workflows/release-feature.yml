name: Release feature
on:
  workflow_call:
    inputs:
      release-version:
        required: true
        type: string
        description: 'The release version.'
      java-version:
        required: false
        type: string
        description: 'Java SDK versjon som skal brukes.'
        default: '25'
      mvn-projects:
        required: false
        type: string
        description: 'Comma-delimited list of specified reactor projects to build instead of all projects.'
        default: ''
      working-directory:
        required: false
        default: .
        type: string
jobs:
  build:
    name: Release
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
      - name: Set up JDK-${{ inputs.java-version }} with cache
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'
      - name: Publish artifacts
        working-directory: ${{ inputs.working-directory }}
        run: |
          mvn -B versions:set -DnewVersion=${{ inputs.release-version }}
          mvn -B -Dmaven.wagon.http.pool=false -DskipTests clean deploy ${{ inputs.mvn-projects }} -Pdeploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
